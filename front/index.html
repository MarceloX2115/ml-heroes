<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Heroes — Sistema de Heróis</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚔️</span>
        <span class="logo-text">ML <strong>Heroes</strong></span>
      </div>
      <nav class="nav">
        <a href="index.html" class="nav-link active">Heróis</a>
        <a href="paginas/funcoes.html" class="nav-link">Funções</a>
      </nav>
    </div>
  </header>

  <!-- HERO BANNER -->
  <section class="page-banner">
    <h1>Sistema de Heróis</h1>
    <p>Gerencie todos os heróis do Mobile Legends</p>
  </section>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- FILTROS -->
    <section class="filters-bar">
      <input type="text" id="inputBusca" placeholder="🔍  Buscar herói pelo nome…" class="input-search" />
      <select id="selectFuncaoFiltro" class="select-input">
        <option value="">Todas as funções</option>
      </select>
      <button id="btnFiltrar" class="btn btn-secondary">Filtrar</button>
      <button id="btnNovoHeroi" class="btn btn-primary">+ Novo Herói</button>
    </section>

    <!-- LISTA DE HERÓIS -->
    <section id="listaHerois" class="heroes-grid">
      <div class="loading">Carregando heróis…</div>
    </section>

  </main>

  <!-- MODAL HERÓI -->
  <div id="modalHeroi" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitulo">Novo Herói</h2>
        <button id="btnFecharModal" class="btn-close">✕</button>
      </div>
      <form id="formHeroi" class="modal-form">
        <input type="hidden" id="heroiId" />

        <div class="form-row">
          <label>Nome *</label>
          <input type="text" id="heroiNome" class="input-field" required placeholder="Ex: Gusion" />
        </div>

        <div class="form-row">
          <label>Função *</label>
          <select id="heroiFuncao" class="select-input" required>
            <option value="">Selecione…</option>
          </select>
        </div>

        <div class="form-row">
          <label>Especialidade</label>
          <input type="text" id="heroiEspecialidade" class="input-field" placeholder="Ex: Burst Damage/Reap" />
        </div>

        <div class="form-row">
          <label>Dificuldade</label>
          <select id="heroiDificuldade" class="select-input">
            <option value="">Selecione…</option>
            <option value="Fácil">Fácil</option>
            <option value="Médio">Médio</option>
            <option value="Difícil">Difícil</option>
          </select>
        </div>

        <div class="form-row">
          <label>URL da Imagem</label>
          <input type="url" id="heroiImagem" class="input-field" placeholder="https://…" />
        </div>

        <div class="form-row">
          <label>Descrição</label>
          <textarea id="heroiDescricao" class="input-field textarea" rows="3" placeholder="Descreva o herói…"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="btnCancelar" class="btn btn-ghost">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="overlay" class="overlay hidden"></div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/script.js"></script>
</body>
</html>
